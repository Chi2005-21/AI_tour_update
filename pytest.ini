[pytest]
pythonpath = src
markers =
    unit: Utility function tests
    agent: Weather and voice agent tests
    itinerary: Itinerary planner tests
    api: FastAPI web API endpoint tests
    e2e: Playwright browser E2E tests
    ragas: RAGAS evaluation report tests
    rag_h1: Smoke test cho RAG Hướng 1 pipeline
    eval_huong2: Smoke test cho Hướng 2 (Multi-Agent) adapter
